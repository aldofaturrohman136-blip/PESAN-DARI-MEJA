<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Beranda - Resto Nusantara</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            color: #0D0D0D;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 0 100px;
        }

        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.4rem 1.2rem 1rem;
            border-bottom: 0.5px solid #E8E8E8;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 10;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: #1A3A2A;
            letter-spacing: 0.06em;
        }

        .page-header .meja {
            font-size: 0.78rem;
            color: #888;
            margin-top: 2px;
            letter-spacing: 0.04em;
        }

        .cart-btn {
            position: relative;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid #1A3A2A;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: #1A3A2A;
            background: white;
        }

        .cart-btn svg { width: 18px; height: 18px; }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #1A3A2A;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .search-bar {
            padding: 1rem 1.2rem 0.5rem;
        }

        .search-bar input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 0.5px solid #D8D8D8;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            color: #0D0D0D;
            background: #F7F7F7;
            outline: none;
            transition: border 0.2s;
        }

        .search-bar input:focus { border-color: #1A3A2A; background: #fff; }
        .search-bar input::placeholder { color: #aaa; }

        .tabs {
            display: flex;
            gap: 8px;
            padding: 0.8rem 1.2rem;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tabs::-webkit-scrollbar { display: none; }

        .tab {
            padding: 0.45rem 1.1rem;
            border-radius: 20px;
            border: 1px solid #D8D8D8;
            background: #fff;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8rem;
            color: #888;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .tab.active {
            background: #1A3A2A;
            border-color: #1A3A2A;
            color: #fff;
        }

        .section-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            color: #0D0D0D;
            padding: 0.5rem 1.2rem 0.8rem;
            letter-spacing: 0.04em;
        }

        .menu-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.9rem 1.2rem;
            border-bottom: 0.5px solid #F0F0F0;
            cursor: pointer;
            transition: background 0.15s;
        }

        .menu-item:hover { background: #F9F9F9; }

        .menu-item-img {
            width: 70px;
            height: 70px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .menu-item-info { flex: 1; min-width: 0; }

        .menu-item-name {
            font-weight: 500;
            font-size: 0.9rem;
            color: #0D0D0D;
            margin-bottom: 3px;
        }

        .menu-item-desc {
            font-size: 0.78rem;
            color: #aaa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-bottom: 5px;
        }

        .menu-item-price {
            font-weight: 700;
            font-size: 0.88rem;
            color: #1A3A2A;
        }

        .menu-item-add {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1.5px solid #1A3A2A;
            background: #fff;
            color: #1A3A2A;
            font-size: 1.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.2s;
            line-height: 1;
        }

        .menu-item-add:hover { background: #1A3A2A; color: #fff; }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: #bbb;
        }

        .empty-state-icon { font-size: 2.5rem; margin-bottom: 1rem; }
        .empty-state h3 { font-size: 1rem; color: #888; margin-bottom: 4px; }
        .empty-state p { font-size: 0.85rem; }

        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.2rem;
            background: #fff;
            border-top: 0.5px solid #E8E8E8;
        }

        .btn-cart-bottom {
            display: block;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0.9rem;
            background: #1A3A2A;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            transition: background 0.2s;
        }

        .btn-cart-bottom:hover { background: #0D1F17; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0D0D0D;
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 20px;
            font-size: 0.82rem;
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <div>
                <h1>Resto Nusantara</h1>
                <p class="meja">Selamat datang</p>
            </div>
            <a href="keranjang.html" class="cart-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <path d="M16 10a4 4 0 01-8 0"/>
                </svg>
                <span class="cart-badge" id="cart-count">0</span>
            </a>
        </div>

        <div class="search-bar">
            <input type="text" id="search-input" placeholder="Cari menu...">
        </div>

        <div class="tabs" id="category-tabs">
            <button class="tab active" data-kategori="Semua">Semua</button>
            <button class="tab" data-kategori="Makanan">Makanan</button>
            <button class="tab" data-kategori="Minuman">Minuman</button>
            <button class="tab" data-kategori="Dessert">Dessert</button>
        </div>

        <p class="section-title">Menu Populer</p>
        <div id="menu-list"></div>
    </div>

    <div class="bottom-bar">
        <a href="keranjang.html" class="btn-cart-bottom" id="cart-btn-bottom">Lihat Keranjang (0)</a>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderMenu('Semua');
            updateCartUI();

            document.querySelectorAll('.tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    renderMenu(this.dataset.kategori);
                });
            });

            document.getElementById('search-input').addEventListener('input', function() {
                renderMenu('Semua', this.value);
            });
        });

        function renderMenu(kategori, search = '') {
            const menuList = document.getElementById('menu-list');
            let menu = Store.getMenuByKategori(kategori);

            if (search) {
                menu = menu.filter(item =>
                    item.nama.toLowerCase().includes(search.toLowerCase()) ||
                    item.deskripsi.toLowerCase().includes(search.toLowerCase())
                );
            }

            if (menu.length === 0) {
                menuList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😕</div>
                        <h3>Menu tidak ditemukan</h3>
                        <p>Coba kata kunci lain</p>
                    </div>`;
                return;
            }

            menuList.innerHTML = menu.map(item => `
                <div class="menu-item" data-id="${item.id}">
                    <img src="${item.gambar}" alt="${item.nama}" class="menu-item-img" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&h=400&fit=crop'">
                    <div class="menu-item-info" onclick="goToDetail('${item.id}')">
                        <div class="menu-item-name">${item.nama}</div>
                        <div class="menu-item-desc">${item.deskripsi}</div>
                        <div class="menu-item-price">${formatRupiah(item.harga)}</div>
                    </div>
                    <button class="menu-item-add" type="button" onclick="addToCart('${item.id}')">+</button>
                </div>
            `).join('');
        }

        function goToDetail(menuId) {
            window.location.href = `detail.html?id=${menuId}`;
        }

        function addToCart(menuId) {
            event.stopPropagation();
            Store.addToCart(menuId, 1);
            updateCartUI();
            showToast('Ditambahkan ke keranjang');
        }

        function updateCartUI() {
            const count = Store.getCartCount();
            document.getElementById('cart-count').textContent = count;
            document.getElementById('cart-btn-bottom').textContent = `Lihat Keranjang (${count})`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
