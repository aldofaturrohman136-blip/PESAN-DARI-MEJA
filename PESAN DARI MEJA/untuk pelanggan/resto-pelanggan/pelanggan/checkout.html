<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Resto Nusantara</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F7F7F7;
            font-family: 'Poppins', sans-serif;
            color: #0D0D0D;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 0 100px;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.2rem;
            background: #fff;
            border-bottom: 0.5px solid #E8E8E8;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.4rem;
            color: #1A3A2A;
            letter-spacing: 0.05em;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border: 1px solid #E0E0E0;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0D0D0D;
            font-size: 1rem;
        }

        /* ── Card ── */
        .card {
            background: #fff;
            border-radius: 10px;
            padding: 1.2rem;
            margin: 1rem 1rem 0;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: #0D0D0D;
            margin-bottom: 1rem;
            letter-spacing: 0.03em;
        }

        /* ── Form ── */
        .required-note {
            font-size: 0.75rem;
            color: #aaa;
            margin-bottom: 1rem;
        }

        .form-group { margin-bottom: 1rem; }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .required-star { color: #dc2626; margin-left: 2px; }

        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 0.5px solid #D8D8D8;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            color: #0D0D0D;
            background: #F7F7F7;
            outline: none;
            transition: border 0.2s;
        }

        .form-input:focus { border-color: #1A3A2A; background: #fff; }
        .form-input.error { border-color: #dc2626; background: #fff5f5; }

        .field-error {
            color: #dc2626;
            font-size: 0.75rem;
            margin-top: 5px;
            display: none;
            align-items: center;
            gap: 4px;
        }
        .field-error.show { display: flex; }

        /* ── Order Summary ── */
        .order-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: #555;
            padding: 4px 0;
        }

        .divider {
            border: none;
            border-top: 0.5px solid #E8E8E8;
            margin: 12px 0;
        }

        .total-row {
            display: flex;
            justify-content: space-between;
            font-weight: 700;
            font-size: 1rem;
        }

        .total-row .amount { color: #1A3A2A; }

        /* ── Payment Options ── */
        .payment-option {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.9rem 1rem;
            border: 1px solid #E0E0E0;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-option.selected {
            border-color: #1A3A2A;
            background: #F0F5F2;
        }

        .payment-option input[type="radio"] { display: none; }

        .payment-option-icon {
            width: 38px;
            height: 38px;
            border-radius: 8px;
            background: #F0F5F2;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .payment-option-icon svg { width: 18px; height: 18px; stroke: #1A3A2A; }

        .payment-option-title {
            font-size: 0.875rem;
            font-weight: 500;
            color: #0D0D0D;
        }

        .payment-option-desc {
            font-size: 0.75rem;
            color: #aaa;
            margin-top: 2px;
        }

        /* ── Bottom Button ── */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.2rem;
            background: #fff;
            border-top: 0.5px solid #E8E8E8;
        }

        .btn-primary {
            display: block;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0.9rem;
            background: #1A3A2A;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #0D1F17; }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 0.85rem;
            background: #fff;
            color: #0D0D0D;
            text-align: center;
            border-radius: 6px;
            border: 1px solid #D8D8D8;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-secondary:hover { background: #F7F7F7; }

        /* ── QRIS Modal ── */
        .qris-modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.6);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .qris-modal-overlay.show { display: flex; }

        .qris-modal-box {
            background: #fff;
            border-radius: 14px;
            padding: 2rem 1.5rem;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .qris-modal-box h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #1A3A2A;
            margin-bottom: 4px;
            letter-spacing: 0.04em;
        }

        .qris-total {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1A3A2A;
            margin-bottom: 1.5rem;
        }

        .qris-modal-img {
            width: 220px;
            height: 220px;
            object-fit: contain;
            border-radius: 10px;
            border: 1px solid #E8E8E8;
        }

        .qris-modal-placeholder {
            width: 220px;
            height: 220px;
            background: #F7F7F7;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            font-size: 0.82rem;
            margin: 0 auto;
        }

        .qris-modal-note {
            font-size: 0.78rem;
            color: #aaa;
            margin: 1rem 0 1.5rem;
            line-height: 1.6;
        }

        .qris-modal-actions {
            display: flex;
            gap: 10px;
        }

        .qris-modal-actions .btn-secondary,
        .qris-modal-actions .btn-primary { flex: 1; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0D0D0D;
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 20px;
            font-size: 0.82rem;
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            white-space: nowrap;
        }

        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <button class="back-btn" onclick="history.back()">←</button>
            <h1>Checkout</h1>
            <div style="width: 36px;"></div>
        </div>

        <!-- Data Pelanggan -->
        <div class="card" style="margin-top: 1rem;">
            <p class="card-title">Data Pelanggan</p>
            <p class="required-note">* Wajib diisi</p>
            <div class="form-group">
                <label class="form-label">Nama Pemesan <span class="required-star">*</span></label>
                <input type="text" class="form-input" id="nama-pemesan" placeholder="Masukkan nama Anda" autocomplete="name">
                <div class="field-error" id="error-nama">⚠ Nama pemesan wajib diisi</div>
            </div>
            <div class="form-group">
                <label class="form-label">Nomor Meja <span class="required-star">*</span></label>
                <input type="number" class="form-input" id="nomor-meja" placeholder="Contoh: 5" min="1">
                <div class="field-error" id="error-meja">⚠ Nomor meja wajib diisi</div>
            </div>
        </div>

        <!-- Ringkasan Pesanan -->
        <div class="card">
            <p class="card-title">Ringkasan Pesanan</p>
            <div id="order-summary"></div>
            <hr class="divider">
            <div class="order-row"><span>Subtotal</span><span id="subtotal">Rp 0</span></div>
            <div class="order-row"><span>PPN 11%</span><span id="ppn">Rp 0</span></div>
            <hr class="divider">
            <div class="total-row"><span>Total</span><span class="amount" id="total">Rp 0</span></div>
        </div>

        <!-- Metode Pembayaran -->
        <div class="card">
            <p class="card-title">Metode Pembayaran</p>

            <label class="payment-option selected" id="opt-tunai">
                <input type="radio" name="pembayaran" value="tunai" checked onchange="selectPayment('tunai')">
                <div class="payment-option-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/>
                        <line x1="12" y1="12" x2="12" y2="16"/><line x1="10" y1="14" x2="14" y2="14"/>
                    </svg>
                </div>
                <div class="payment-option-info">
                    <div class="payment-option-title">Bayar di Kasir</div>
                    <div class="payment-option-desc">Bayar langsung ke kasir setelah makan</div>
                </div>
            </label>

            <label class="payment-option" id="opt-qris">
                <input type="radio" name="pembayaran" value="qris" onchange="selectPayment('qris')">
                <div class="payment-option-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2"/><path d="M7 7h4v4H7z"/>
                        <path d="M13 7h4v4h-4z"/><path d="M7 13h4v4H7z"/>
                        <path d="M13 13h1"/><path d="M17 13v4h-3"/>
                    </svg>
                </div>
                <div class="payment-option-info">
                    <div class="payment-option-title">QRIS</div>
                    <div class="payment-option-desc">Scan QR code untuk pembayaran</div>
                </div>
            </label>
        </div>
    </div>

    <!-- Bottom Button -->
    <div class="bottom-bar">
        <button class="btn-primary" onclick="placeOrder()">Pesan Sekarang</button>
    </div>

    <!-- Modal QRIS -->
    <div class="qris-modal-overlay" id="qris-modal">
        <div class="qris-modal-box">
            <h2>Scan QRIS</h2>
            <div class="qris-total" id="qris-modal-total">Rp 0</div>
            <div id="qris-modal-img-wrap" style="display:flex; justify-content:center; margin-bottom: 4px;">
                <img id="qris-modal-img" src="" alt="QRIS" class="qris-modal-img" style="display:none;">
                <div id="qris-modal-placeholder" class="qris-modal-placeholder">QRIS belum tersedia</div>
            </div>
            <p class="qris-modal-note">Scan dengan e-wallet atau mobile banking apapun.<br>Tunjukkan bukti bayar ke kasir.</p>
            <div class="qris-modal-actions">
                <button class="btn-secondary" onclick="batalQRIS()">Batal</button>
                <button class="btn-primary" onclick="konfirmasiQRIS()">Sudah Bayar</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/store.js"></script>
    <script>
        let selectedPayment = 'tunai';
        let pendingOrderData = null;

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const isFirst = urlParams.get('first');
            const savedName = Store.getCustomerName(), savedTable = Store.getTableNumber();
            if (savedName) document.getElementById('nama-pemesan').value = savedName;
            if (savedTable) document.getElementById('nomor-meja').value = savedTable;
            if (isFirst) {
                document.querySelector('.back-btn').style.display = 'none';
                document.querySelector('h1').textContent = 'Selamat Datang';
                document.querySelector('.btn-primary').textContent = 'Mulai Pesan';
            }
            renderOrderSummary();
            document.getElementById('nama-pemesan').addEventListener('input', () => clearError('nama-pemesan', 'error-nama'));
            document.getElementById('nomor-meja').addEventListener('input', () => clearError('nomor-meja', 'error-meja'));
        });

        function renderOrderSummary() {
            const cart = Store.getCart(), menu = Store.getMenu();
            document.getElementById('order-summary').innerHTML = cart.map(item => {
                const m = menu.find(x => x.id === item.menuId);
                if (!m) return '';
                return `<div class="order-row"><span>${m.nama} x${item.jumlah}</span><span>${formatRupiah(m.harga * item.jumlah)}</span></div>`;
            }).join('');
            const subtotal = Store.getCartTotal(), ppn = Math.round(subtotal * 0.11), total = subtotal + ppn;
            document.getElementById('subtotal').textContent = formatRupiah(subtotal);
            document.getElementById('ppn').textContent = formatRupiah(ppn);
            document.getElementById('total').textContent = formatRupiah(total);
        }

        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
            document.getElementById('opt-' + method).classList.add('selected');
        }

        function showError(inputId, errorId) {
            document.getElementById(inputId).classList.add('error');
            document.getElementById(errorId).classList.add('show');
        }
        function clearError(inputId, errorId) {
            document.getElementById(inputId).classList.remove('error');
            document.getElementById(errorId).classList.remove('show');
        }

        function placeOrder() {
            const nama = document.getElementById('nama-pemesan').value.trim();
            const meja = document.getElementById('nomor-meja').value.trim();
            let valid = true;
            if (!nama) { showError('nama-pemesan', 'error-nama'); document.getElementById('nama-pemesan').focus(); valid = false; }
            else clearError('nama-pemesan', 'error-nama');
            if (!meja) { showError('nomor-meja', 'error-meja'); if (valid) document.getElementById('nomor-meja').focus(); valid = false; }
            else clearError('nomor-meja', 'error-meja');
            if (!valid) return;

            Store.setCustomerName(nama);
            Store.setTableNumber(meja);

            const cart = Store.getCart();
            const isFirst = new URLSearchParams(window.location.search).get('first');
            if (cart.length === 0 && !isFirst) { showToast('Keranjang masih kosong'); return; }

            if (cart.length > 0) {
                const menu = Store.getMenu();
                const items = cart.map(item => {
                    const m = menu.find(x => x.id === item.menuId);
                    return { menuId: item.menuId, nama: m ? m.nama : 'Unknown', harga: m ? m.harga : 0, jumlah: item.jumlah, catatan: item.catatan };
                });
                const subtotal = Store.getCartTotal(), ppn = Math.round(subtotal * 0.11), total = subtotal + ppn;
                const catatan = localStorage.getItem('rn_catatan_pesanan') || '';
                pendingOrderData = { namaPelanggan: nama, meja, items, subtotal, ppn, total, catatan, pembayaran: selectedPayment };

                if (selectedPayment === 'qris') {
                    showQRISModal(total);
                } else {
                    submitOrder('Menunggu');
                }
            } else {
                window.location.href = 'beranda.html';
            }
        }

        function showQRISModal(total) {
            document.getElementById('qris-modal-total').textContent = formatRupiah(total);
            const url = Store.getQRISUrl ? Store.getQRISUrl() : '';
            const img = document.getElementById('qris-modal-img');
            const placeholder = document.getElementById('qris-modal-placeholder');
            if (url && url.trim() !== '') {
                img.src = url; img.style.display = 'block'; placeholder.style.display = 'none';
            } else {
                img.style.display = 'none'; placeholder.style.display = 'flex';
            }
            document.getElementById('qris-modal').classList.add('show');
        }

        function batalQRIS() {
            document.getElementById('qris-modal').classList.remove('show');
            pendingOrderData = null;
        }

        function konfirmasiQRIS() {
            document.getElementById('qris-modal').classList.remove('show');
            submitOrder('Lunas');
        }

        function submitOrder(pembayaranStatus) {
            const order = Store.createOrder({ ...pendingOrderData, pembayaranStatus });
            Store.clearCart();
            localStorage.removeItem('rn_catatan_pesanan');
            pendingOrderData = null;
            window.location.href = `konfirmasi.html?order=${encodeURIComponent(order.id)}`;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
