<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resto Nusantara - Pesan dari Meja</title>
    <link rel="stylesheet" href="shared/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        .landing-page {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; background: #ffffff;
            color: var(--text); text-align: center; padding: 24px;
        }
        .logo-icon {
            margin-bottom: 2rem;
        }
        .logo-icon svg {
            width: 44px;
            height: 44px;
        }
        .landing-page h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 3.2rem;
            margin-bottom: 0;
            line-height: 1;
            letter-spacing: 0.04em;
        }
        .landing-page h1 .thin { font-weight: 300; color: #0D0D0D; }
        .landing-page h1 .bold { font-weight: 600; color: #1A3A2A; letter-spacing: 0.18em; }
        .landing-page .subtitle {
            font-family: 'Poppins', sans-serif;
            font-size: 0.85rem;
            margin: 1.2rem 0 3rem;
            color: #888;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .btn-pelanggan {
            display: inline-flex; align-items: center; gap: 10px;
            padding: 1rem 3rem; border-radius: 4px;
            background: #1A3A2A;
            color: white; text-decoration: none; font-weight: 500; font-size: 0.9rem;
            transition: background 0.2s ease; border: none;
            font-family: 'Poppins', sans-serif;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        .btn-pelanggan:hover { background: #0D1F17; transform: none; box-shadow: none; }
        .qr-hint {
            margin-top: 3rem; padding: 1rem 1.8rem;
            background: #F7F7F7;
            border-radius: 8px; border: none;
            box-shadow: none; display: flex; align-items: center; gap: 12px;
        }
        .qr-hint p { color: #888; font-size: 0.85rem; margin: 0; font-family: 'Poppins', sans-serif; }
    </style>
</head>
<body>
    <div class="landing-page">
        <div class="logo-icon">
            <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="22" cy="22" r="20" stroke="#1A3A2A" stroke-width="1.2"/>
                <path d="M22 10 C22 10 29 15.5 29 22 C29 28.5 22 34 22 34 C22 34 15 28.5 15 22 C15 15.5 22 10 22 10Z"
                      stroke="#1A3A2A" stroke-width="1" fill="none"/>
                <line x1="10" y1="22" x2="34" y2="22" stroke="#1A3A2A" stroke-width="0.8"/>
            </svg>
        </div>

        <h1>
            <span class="thin">RESTO</span><br>
            <span class="bold">NUSANTARA</span>
        </h1>

        <p class="subtitle">Pesan Makanan dari Meja Tanpa Antri</p>

        <a href="pelanggan/beranda.html" class="btn-pelanggan">Pesan Sekarang</a>

        <div class="qr-hint">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M7 7h4v4H7z"/><path d="M13 7h4v4h-4z"/>
                <path d="M7 13h4v4H7z"/><path d="M13 13h1"/><path d="M17 13v4h-3"/>
            </svg>
            <p>Scan QR code di meja untuk mulai memesan</p>
        </div>
    </div>
</body>
</html>
