<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Resto Nusantara</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="admin-shell.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Mobile Menu Button -->
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    
    <!-- Mobile Overlay -->
    <div class="mobile-overlay" onclick="toggleMenu()"></div>

    <aside class="admin-sidebar" id="sidebar">
        <div class="admin-sidebar-brand">
            <div class="brand-logo">
                <svg width="24" height="24" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="22" cy="22" r="20" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
                    <path d="M22 10 C22 10 29 15.5 29 22 C29 28.5 22 34 22 34 C22 34 15 28.5 15 22 C15 15.5 22 10 22 10Z"
                          stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none"/>
                    <line x1="10" y1="22" x2="34" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
                </svg>
                <h2>Resto Nusantara</h2>
            </div>
            <p>Panel Admin</p>
        </div>
        <ul class="admin-nav">
            <li><a href="dashboard.html" class="active">Dashboard</a></li>
            <li><a href="dapur.html">Antrian Dapur</a></li>
            <li><a href="menu.html">Kelola Menu</a></li>
            <li><a href="pembayaran.html">Pembayaran</a></li>
        </ul>
        <div class="admin-sidebar-footer">
            <a href="../index.html">Keluar</a>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>Dashboard</h1>
            <div class="admin-header-actions">
                <span style="color: #888; font-size: 0.8rem;" id="current-date"></span>
            </div>
        </div>

        <div class="admin-content">
            <!-- Stats -->
            <div class="stats-grid" id="stats-grid"></div>

            <!-- Recent Orders -->
            <div class="content-card">
                <div class="content-card-header">
                    <h2>Pesanan Terbaru</h2>
                    <a href="dapur.html" style="color: #1A3A2A; text-decoration: none; font-size: 0.8rem;">Lihat Semua →</a>
                </div>
                <div class="content-card-body" id="recent-orders"></div>
            </div>
        </div>
    </main>

    <script src="../shared/store.js"></script>
    <script>
        // Mobile menu
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.mobile-overlay').style.display = 
                document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
        }

        // Date
        document.getElementById('current-date').textContent = new Date().toLocaleDateString('id-ID', {
            day: 'numeric', month: 'long', year: 'numeric'
        });

        function renderStats() {
            const stats = Store.getStats();
            document.getElementById('stats-grid').innerHTML = `
                <div class="stat-card">
                    <div class="stat-icon green">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#2E7D32" stroke-width="2">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                            <rect x="9" y="3" width="6" height="4" rx="1"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">Pesanan Aktif</div>
                        <div class="stat-value">${stats.pesananHariIni}</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon teal">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#00796B" stroke-width="2">
                            <path d="M20 6L9 17l-5-5"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">Selesai Hari Ini</div>
                        <div class="stat-value">${stats.selesaiHariIni}</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon slate">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#546E7A" stroke-width="2">
                            <line x1="12" y1="1" x2="12" y2="23"/>
                            <path d="M17 5H9.5a3.5 3.5 0 100 7h5a3.5 3.5 0 110 7H6"/>
                        </svg>
                    </div>
                    <div class="stat-info">
                        <div class="stat-label">Total Penjualan</div>
                        <div class="stat-value">${formatRupiah(stats.totalPenjualan)}</div>
                    </div>
                </div>
            `;
        }

        function getStatusBadge(status) {
            const map = {
                'Baru': 'badge-baru',
                'Diproses': 'badge-diproses',
                'Siap': 'badge-siap',
                'Selesai': 'badge-selesai'
            };
            return `<span class="badge ${map[status] || 'badge-selesai'}">${status}</span>`;
        }

        function renderRecentOrders() {
            const orders = Store.getOrders().slice(0, 5);
            const container = document.getElementById('recent-orders');
            
            if (orders.length === 0) {
                container.innerHTML = '<p style="color: #bbb; text-align: center; padding: 24px;">Belum ada pesanan</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>Meja</th>
                            <th>Waktu</th>
                            <th>Status</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${orders.map(order => `
                            <tr>
                                <td style="font-weight: 500;">${order.id}</td>
                                <td>Meja ${order.meja || '-'}</td>
                                <td style="color: #888; font-size: 0.82rem;">${timeAgo(order.waktu)}</td>
                                <td>${getStatusBadge(order.status)}</td>
                                <td style="font-weight: 600; color: #1A3A2A;">${formatRupiah(order.total || 0)}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function renderAll() {
            renderStats();
            renderRecentOrders();
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderAll();
            Store.onSync(() => renderAll());
            setInterval(renderAll, 3000);
        });
    </script>
</body>
</html>
