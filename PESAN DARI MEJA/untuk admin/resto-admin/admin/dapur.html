<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antrian Dapur - Resto Nusantara</title>
    <link rel="stylesheet" href="../shared/style.css">
    <link rel="stylesheet" href="admin-shell.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <button class="mobile-menu-btn" onclick="toggleMenu()">☰</button>
    <div class="mobile-overlay" onclick="toggleMenu()"></div>

    <aside class="admin-sidebar" id="sidebar">
        <div class="admin-sidebar-brand">
            <div class="brand-logo">
                <svg width="24" height="24" viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="22" cy="22" r="20" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
                    <path d="M22 10 C22 10 29 15.5 29 22 C29 28.5 22 34 22 34 C22 34 15 28.5 15 22 C15 15.5 22 10 22 10Z"
                          stroke="rgba(255,255,255,0.5)" stroke-width="1" fill="none"/>
                    <line x1="10" y1="22" x2="34" y2="22" stroke="rgba(255,255,255,0.5)" stroke-width="0.8"/>
                </svg>
                <h2>Resto Nusantara</h2>
            </div>
            <p>Panel Admin</p>
        </div>
        <ul class="admin-nav">
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="dapur.html" class="active">Antrian Dapur</a></li>
            <li><a href="menu.html">Kelola Menu</a></li>
            <li><a href="pembayaran.html">Pembayaran</a></li>
        </ul>
        <div class="admin-sidebar-footer">
            <a href="../index.html">Keluar</a>
        </div>
    </aside>

    <main class="admin-main">
        <div class="admin-header">
            <h1>Antrian Dapur</h1>
            <div class="admin-header-actions">
                <span id="last-update" style="font-size: 0.75rem; color: #999;"></span>
            </div>
        </div>

        <div class="admin-content">
            <div class="kanban-board">
                <div class="kanban-column">
                    <div class="kanban-header baru">Baru</div>
                    <div class="kanban-body" id="kolom-baru"></div>
                </div>
                <div class="kanban-column">
                    <div class="kanban-header diproses">Diproses</div>
                    <div class="kanban-body" id="kolom-diproses"></div>
                </div>
                <div class="kanban-column">
                    <div class="kanban-header selesai">Selesai</div>
                    <div class="kanban-body" id="kolom-selesai"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="../shared/store.js"></script>
    <script>
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('open');
            document.querySelector('.mobile-overlay').style.display = 
                document.getElementById('sidebar').classList.contains('open') ? 'block' : 'none';
        }

        function renderDapur() {
            const orders = Store.getOrders();
            const baru = orders.filter(o => o.status === 'Baru');
            const diproses = orders.filter(o => o.status === 'Diproses');
            const selesai = orders.filter(o => o.status === 'Selesai' || o.status === 'Siap');

            renderKolom('kolom-baru', baru, 'baru');
            renderKolom('kolom-diproses', diproses, 'diproses');
            renderKolom('kolom-selesai', selesai, 'selesai');

            document.getElementById('last-update').textContent = 'Update: ' + new Date().toLocaleTimeString('id-ID');
        }

        function renderKolom(kolomId, orders, tipe) {
            const container = document.getElementById(kolomId);
            
            if (orders.length === 0) {
                container.innerHTML = `<div style="text-align: center; padding: 40px; color: #bbb;"><p style="font-size: 0.85rem;">Kosong</p></div>`;
                return;
            }

            container.innerHTML = orders.map(order => {
                const itemsHtml = order.items ? order.items.map(item => 
                    `<li>${item.nama} <span style="color: #999;">x${item.jumlah}</span></li>`
                ).join('') : '';

                const isSelesai = order.status === 'Selesai' || order.status === 'Siap';

                return `
                    <div class="order-card ${isSelesai ? 'selesai' : ''}">
                        <div class="order-title">${order.id}</div>
                        <div class="order-meta">Meja ${order.meja || '-'} · ${order.namaPelanggan || 'Tanpa Nama'}</div>
                        <ul class="order-items">${itemsHtml}</ul>
                        
                        ${order.catatan ? `
                            <div style="font-size: 0.8rem; color: #888; font-style: italic; background: #F9F9F9; 
                                        padding: 8px; border-radius: 4px; margin-bottom: 12px;">
                                "${order.catatan}"
                            </div>
                        ` : ''}

                        ${!isSelesai ? `
                            <button class="btn-action ${tipe === 'baru' ? 'btn-proses' : 'btn-selesai'}" 
                                    onclick="ubahStatus('${order.id}', '${tipe === 'baru' ? 'Diproses' : 'Selesai'}')">
                                ${tipe === 'baru' ? '➡️ Proses' : '✓ Selesai'}
                            </button>
                        ` : `
                            <button class="btn-action btn-done" disabled>✓ Sudah Selesai</button>
                        `}
                        
                        <div class="badge-waktu">${timeAgo(order.waktu)}</div>
                    </div>
                `;
            }).join('');
        }

        function ubahStatus(id, status) {
            Store.updateOrderStatus(id, status);
            renderDapur();
        }

        document.addEventListener('DOMContentLoaded', function() {
            renderDapur();
            Store.onSync(() => renderDapur());
            setInterval(renderDapur, 3000);
        });
    </script>
</body>
</html>
