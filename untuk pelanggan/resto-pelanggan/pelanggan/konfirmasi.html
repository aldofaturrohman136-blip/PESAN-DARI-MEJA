<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Status Pesanan - Resto Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #ffffff;
            font-family: 'Poppins', sans-serif;
            color: #0D0D0D;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 0 0 100px;
        }

        /* ── Header ── */
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.4rem 1.2rem 1rem;
            border-bottom: 0.5px solid #E8E8E8;
            position: sticky;
            top: 0;
            background: #fff;
            z-index: 10;
        }

        .page-header h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.5rem;
            color: #1A3A2A;
            letter-spacing: 0.06em;
        }

        .back-btn {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1.5px solid #1A3A2A;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #1A3A2A;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #1A3A2A;
            color: white;
        }

        .back-btn svg {
            width: 18px;
            height: 18px;
        }

        /* ── Success Screen ── */
        .success-screen {
            background: white;
            border-radius: 14px;
            padding: 2.5rem 1.5rem;
            margin: 1.2rem;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border: 0.5px solid #F0F0F0;
        }

        .success-icon {
            width: 72px;
            height: 72px;
            background: #1A3A2A;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.5rem;
            box-shadow: 0 8px 20px rgba(26,58,42,0.15);
        }

        .success-icon svg {
            width: 32px;
            height: 32px;
            color: white;
        }

        .success-screen h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 600;
            color: #1A3A2A;
            margin-bottom: 0.5rem;
            letter-spacing: 0.04em;
        }

        .success-screen p {
            font-size: 0.85rem;
            color: #888;
            line-height: 1.6;
        }

        /* ── Timeline ── */
        .status-timeline {
            background: white;
            padding: 1.5rem 1.2rem;
            border-radius: 14px;
            margin: 0 1.2rem 1.2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border: 0.5px solid #F0F0F0;
        }

        .timeline-item {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 0.8rem 0;
            position: relative;
        }

        .timeline-item:not(:last-child)::after {
            content: '';
            position: absolute;
            left: 11px;
            top: 36px;
            width: 2px;
            height: calc(100% - 20px);
            background: #ddd;
        }

        .timeline-item.done:not(:last-child)::after {
            background: #1A3A2A;
        }

        .status-step-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #ddd;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 2px;
            z-index: 1;
        }

        .status-step-dot.done {
            background: #1A3A2A;
        }

        .status-step-dot.active {
            background: #1A3A2A;
            box-shadow: 0 0 0 4px rgba(26,58,42,0.12);
        }

        .status-step-dot svg {
            width: 12px;
            height: 12px;
            color: white;
        }

        .timeline-content h4 {
            font-weight: 500;
            font-size: 0.9rem;
            color: #0D0D0D;
            margin-bottom: 2px;
        }

        .timeline-content p {
            font-size: 0.78rem;
            color: #aaa;
        }

        /* ── Card ── */
        .card {
            background: white;
            border-radius: 14px;
            padding: 1.5rem 1.2rem;
            margin: 0 1.2rem 1.2rem;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            border: 0.5px solid #F0F0F0;
        }

        .card h3 {
            font-family: 'Cormorant Garamond', serif;
            color: #1A3A2A;
            font-size: 1.3rem;
            font-weight: 600;
            margin-bottom: 1rem;
            letter-spacing: 0.04em;
        }

        /* ── Order Items ── */
        .order-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.8rem 0;
            border-bottom: 0.5px solid #F0F0F0;
        }

        .order-item:last-child {
            border-bottom: none;
        }

        .order-item-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            flex-shrink: 0;
        }

        .order-item-info {
            flex: 1;
        }

        .order-item-name {
            font-weight: 500;
            font-size: 0.85rem;
            color: #0D0D0D;
        }

        .order-item-qty {
            font-size: 0.78rem;
            color: #aaa;
        }

        .order-item-price {
            font-weight: 600;
            font-size: 0.85rem;
            color: #1A3A2A;
        }

        .card-row {
            display: flex;
            justify-content: space-between;
            padding: 0.6rem 0;
            border-bottom: 0.5px solid #F0F0F0;
            font-size: 0.85rem;
        }

        .card-row:last-child {
            border-bottom: none;
        }

        .card-row span:first-child {
            color: #888;
        }

        .card-row span:last-child {
            font-weight: 500;
            color: #0D0D0D;
        }

        .card-row.total {
            margin-top: 0.5rem;
            padding-top: 1rem;
            border-top: 1.5px solid #1A3A2A;
            border-bottom: none;
        }

        .card-row.total span {
            font-weight: 700;
            font-size: 1rem;
            color: #1A3A2A;
        }

        /* ── Payment Status ── */
        .payment-status {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }

        .payment-status.menunggu {
            background: #FFF3E0;
            color: #E65100;
        }

        .payment-status.lunas {
            background: #F0F5F2;
            color: #1A3A2A;
            border: 1px solid #1A3A2A;
        }

        /* ── Button ── */
        .btn-primary {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background: #1A3A2A;
            color: white;
            text-align: center;
            border-radius: 6px;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.05em;
            border: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background: #0D1F17;
        }

        .btn-secondary {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background: white;
            border: 1.5px solid #ddd;
            border-radius: 6px;
            color: #0D0D0D;
            text-align: center;
            text-decoration: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:hover {
            background: #F0F5F2;
            border-color: #1A3A2A;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 0 1.2rem;
            margin-bottom: 1.2rem;
        }

        /* ── Not Found ── */
        .not-found {
            text-align: center;
            padding: 4rem 2rem;
            color: #888;
        }

        .not-found h3 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem;
            color: #1A3A2A;
            margin-bottom: 0.5rem;
        }

        .not-found a {
            color: #1A3A2A;
            text-decoration: none;
            font-weight: 500;
        }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0D0D0D;
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 20px;
            font-size: 0.82rem;
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="page-header">
            <button class="back-btn" onclick="window.location.href='beranda.html'">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            </button>
            <h1>Status Pesanan</h1>
            <div style="width:42px"></div>
        </div>

        <div id="konfirmasi-content"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/store.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            renderKonfirmasi();
        });

        function renderKonfirmasi() {
            const content = document.getElementById('konfirmasi-content');

            // Ambil order ID dari URL
            const urlParams = new URLSearchParams(window.location.search);
            const orderId = urlParams.get('order');

            let order;
            if (orderId) {
                order = Store.getOrderById(orderId);
                // Coba cari dengan prefix # juga
                if (!order && !orderId.startsWith('#')) {
                    order = Store.getOrderById('#' + orderId);
                }
                // Coba cari tanpa prefix #
                if (!order && orderId.startsWith('#')) {
                    order = Store.getOrderById(orderId.substring(1));
                }
            }

            // Kalau tidak ada di URL, ambil yang terakhir
            if (!order) {
                const orders = Store.getOrders();
                order = orders.length > 0 ? orders[0] : null;
            }

            if (!order) {
                content.innerHTML = `
                    <div class="not-found">
                        <h3>Pesanan tidak ditemukan</h3>
                        <p>Belum ada pesanan yang dibuat</p>
                        <p style="margin-top:1rem"><a href="beranda.html">Kembali ke Beranda</a></p>
                    </div>`;
                return;
            }

            // Normalize items (support format lama dan baru)
            const items = (order.items || []).map(item => ({
                nama: item.nama || 'Unknown',
                harga: item.harga || 0,
                gambar: item.gambar || '',
                qty: item.qty || item.jumlah || 1,
                catatan: item.catatan || ''
            }));

            // Render items
            const itemsHtml = items.length > 0 ? items.map(item => `
                <div class="order-item">
                    <img src="${item.gambar}" alt="${item.nama}" class="order-item-img" onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&h=400&fit=crop'">
                    <div class="order-item-info">
                        <div class="order-item-name">${item.nama}</div>
                        <div class="order-item-qty">${item.qty}x @ ${formatRupiah(item.harga)}</div>
                    </div>
                    <div class="order-item-price">${formatRupiah(item.harga * item.qty)}</div>
                </div>
            `).join('') : '<div style="color:#aaa; font-size:0.85rem; padding:1rem 0;">Tidak ada detail item</div>';

            // Status badge
            const statusClass = order.pembayaranStatus === 'Lunas' ? 'lunas' : 'menunggu';
            const statusText = order.pembayaranStatus === 'Lunas' ? 'Lunas' : 'Menunggu Pembayaran';

            // Render timeline
            const timelineHtml = `
                <div class="status-timeline">
                    <div class="timeline-item done">
                        <div class="status-step-dot done">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                        </div>
                        <div class="timeline-content">
                            <h4>Pesanan Diterima</h4>
                            <p>${order.waktu || '-'}</p>
                        </div>
                    </div>
                    <div class="timeline-item active">
                        <div class="status-step-dot active">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                        <div class="timeline-content">
                            <h4>Sedang Diproses</h4>
                            <p>Pesanan Anda sedang disiapkan</p>
                        </div>
                    </div>
                    <div class="timeline-item">
                        <div class="status-step-dot"></div>
                        <div class="timeline-content">
                            <h4>Selesai</h4>
                            <p>Menunggu konfirmasi</p>
                        </div>
                    </div>
                </div>
            `;

            content.innerHTML = `
                <div class="success-screen">
                    <div class="success-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="20 6 9 17 4 12"/>
                        </svg>
                    </div>
                    <h2>Pesanan Berhasil!</h2>
                    <p>Terima kasih telah memesan. Kami akan segera memproses pesanan Anda.</p>
                </div>

                ${timelineHtml}

                <div class="card">
                    <h3>Detail Pesanan</h3>
                    ${itemsHtml}
                    <div class="card-row">
                        <span>No. Pesanan</span>
                        <span>${order.noPesanan || order.id}</span>
                    </div>
                    <div class="card-row">
                        <span>Nama</span>
                        <span>${order.namaPelanggan || '-'}</span>
                    </div>
                    <div class="card-row">
                        <span>Meja</span>
                        <span>Meja ${order.meja || '-'}</span>
                    </div>
                    <div class="card-row">
                        <span>Tanggal</span>
                        <span>${order.tanggal || formatTanggal(order.waktu)}</span>
                    </div>
                    <div class="card-row">
                        <span>Metode Pembayaran</span>
                        <span>${order.pembayaran || 'Tunai'}</span>
                    </div>
                    <div class="card-row">
                        <span>Status Pembayaran</span>
                        <span><span class="payment-status ${statusClass}">${statusText}</span></span>
                    </div>
                    ${order.vaNumber ? `
                    <div class="card-row">
                        <span>No. VA</span>
                        <span>${order.vaNumber}</span>
                    </div>
                    ` : ''}
                    <div class="card-row total">
                        <span>Total</span>
                        <span>${formatRupiah(order.total || 0)}</span>
                    </div>
                </div>

                <div class="button-group">
                    <a href="beranda.html" class="btn-primary">Pesan Lagi</a>
                    <button class="btn-secondary" onclick="showToast('Struk dikirim ke email')">Unduh Struk</button>
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
