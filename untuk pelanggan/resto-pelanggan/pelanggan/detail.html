<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Menu - Resto Nusantara</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #F7F7F7;
            font-family: 'Poppins', sans-serif;
            color: #0D0D0D;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 100px;
        }

        /* ── Hero Image ── */
        .hero-wrap {
            position: relative;
            width: 100%;
            height: 300px;
            overflow: hidden;
        }

        .detail-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* gradient overlay supaya header icon terbaca */
        .hero-wrap::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, transparent 45%, rgba(0,0,0,0.12) 100%);
            pointer-events: none;
        }

        /* ── Header ── */
        .page-header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.1rem 1.2rem;
            z-index: 10;
        }

        .back-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #0D0D0D;
            font-size: 1rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            backdrop-filter: blur(4px);
        }

        .cart-btn {
            width: 36px;
            height: 36px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.92);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            backdrop-filter: blur(4px);
            position: relative;
        }

        .cart-btn svg { width: 17px; height: 17px; stroke: #1A3A2A; }

        .cart-badge {
            position: absolute;
            top: -4px;
            right: -4px;
            background: #1A3A2A;
            color: #fff;
            font-size: 0.62rem;
            font-weight: 700;
            width: 17px;
            height: 17px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── Content Card ── */
        .content-card {
            background: #fff;
            border-radius: 14px 14px 0 0;
            margin-top: -18px;
            position: relative;
            z-index: 2;
            padding: 1.5rem 1.2rem;
        }

        /* ── Badge tersedia ── */
        .tersedia-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 4px 12px;
            border-radius: 20px;
            background: #F0F5F2;
            color: #1A3A2A;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #C8DDD2;
            margin-bottom: 10px;
        }

        .tersedia-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #1A3A2A;
        }

        /* ── Name & Price ── */
        .detail-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.6rem;
            font-weight: 600;
            color: #0D0D0D;
            line-height: 1.25;
            margin-bottom: 6px;
            letter-spacing: 0.02em;
        }

        .detail-price {
            font-size: 1.2rem;
            font-weight: 700;
            color: #1A3A2A;
            margin-bottom: 1rem;
        }

        .detail-desc {
            font-size: 0.875rem;
            color: #666;
            line-height: 1.75;
            margin-bottom: 1.5rem;
        }

        /* ── Divider ── */
        .divider {
            border: none;
            border-top: 0.5px solid #E8E8E8;
            margin: 1.2rem 0;
        }

        /* ── Section ── */
        .section-label {
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        /* ── Qty Selector ── */
        .qty-selector {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #F7F7F7;
            border: 0.5px solid #E0E0E0;
            border-radius: 8px;
            padding: 6px 10px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #E0E0E0;
            border-radius: 50%;
            background: #fff;
            cursor: pointer;
            font-size: 1.1rem;
            color: #1A3A2A;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
            line-height: 1;
        }

        .qty-btn:hover { background: #F0F5F2; border-color: #1A3A2A; }
        .qty-btn.minus:hover { background: #FFF5F5; border-color: #dc2626; color: #dc2626; }
        .qty-btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }

        .qty-value {
            font-size: 1rem;
            font-weight: 600;
            min-width: 24px;
            text-align: center;
            color: #0D0D0D;
        }

        /* ── Form ── */
        .form-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 0.5px solid #D8D8D8;
            border-radius: 6px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            color: #0D0D0D;
            background: #F7F7F7;
            outline: none;
            transition: border 0.2s;
        }

        .form-input:focus { border-color: #1A3A2A; background: #fff; }

        /* ── Bottom Bar ── */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem 1.2rem;
            background: #fff;
            border-top: 0.5px solid #E8E8E8;
        }

        .btn-primary {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding: 0.9rem 1.2rem;
            background: #1A3A2A;
            color: #fff;
            border-radius: 6px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.03em;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #0D1F17; }

        .btn-label { display: flex; align-items: center; gap: 8px; }
        .btn-label svg { width: 17px; height: 17px; stroke: rgba(255,255,255,0.8); }
        .btn-price { font-weight: 700; font-size: 0.95rem; }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 88px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #0D0D0D;
            color: #fff;
            padding: 0.6rem 1.4rem;
            border-radius: 20px;
            font-size: 0.82rem;
            opacity: 0;
            transition: all 0.25s;
            pointer-events: none;
            white-space: nowrap;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="container">
        <!-- Hero with header overlay -->
        <div class="hero-wrap" id="hero-wrap">
            <img id="detail-img" src="" alt="" class="detail-img"
                 onerror="this.src='https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=800&h=600&fit=crop'">
            <div class="page-header">
                <button class="back-btn" onclick="history.back()">←</button>
                <button class="cart-btn" onclick="window.location.href='keranjang.html'" id="cart-icon-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
                        <line x1="3" y1="6" x2="21" y2="6"/>
                        <path d="M16 10a4 4 0 01-8 0"/>
                    </svg>
                    <span class="cart-badge" id="cart-badge" style="display:none">0</span>
                </button>
            </div>
        </div>

        <!-- Content -->
        <div class="content-card">
            <span class="tersedia-badge"><span class="tersedia-dot"></span> Tersedia</span>
            <div class="detail-name" id="detail-name">—</div>
            <div class="detail-price" id="detail-price">Rp 0</div>
            <div class="detail-desc" id="detail-desc"></div>

            <hr class="divider">

            <!-- Jumlah -->
            <div style="margin-bottom: 1.2rem;">
                <div class="section-label">Jumlah</div>
                <div class="qty-selector">
                    <button class="qty-btn minus" id="btn-minus" onclick="changeQty(-1)" disabled>−</button>
                    <span class="qty-value" id="qty-value">1</span>
                    <button class="qty-btn" onclick="changeQty(1)">+</button>
                </div>
            </div>

            <hr class="divider">

            <!-- Catatan -->
            <div>
                <div class="section-label" style="margin-bottom: 10px;">Catatan <span style="text-transform:none; color:#bbb; font-size:0.75rem; letter-spacing:0;">(opsional)</span></div>
                <input type="text" class="form-input" id="catatan-input"
                       placeholder="Contoh: tidak pedas, tanpa bawang...">
            </div>
        </div>
    </div>

    <!-- Bottom Bar -->
    <div class="bottom-bar">
        <button class="btn-primary" id="btn-tambah" onclick="addToCart()">
            <span class="btn-label">
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                    <path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.97-1.68l1.65-8.32H6"/>
                </svg>
                Tambah ke Keranjang
            </span>
            <span class="btn-price" id="btn-price">Rp 0</span>
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script src="../shared/store.js"></script>
    <script>
        // ── Fallback demo jika store.js tidak ada ──
        if (typeof Store === 'undefined') {
            window.Store = {
                getMenuById: (id) => ({
                    id: '1',
                    nama: 'Nasi Goreng Spesial',
                    harga: 45000,
                    gambar: 'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=800&h=600&fit=crop',
                    deskripsi: 'Nasi goreng dengan bumbu rahasia pilihan, disajikan dengan telur mata sapi, ayam suwir, kerupuk udang, dan acar timun segar. Cocok dinikmati kapan saja.'
                }),
                addToCart: (id, qty, cat) => console.log('addToCart', id, qty, cat),
                getCartCount: () => 2
            };
        }

        if (typeof formatRupiah === 'undefined') {
            window.formatRupiah = (n) => 'Rp ' + n.toLocaleString('id-ID');
        }

        let currentMenu = null;
        let quantity = 1;

        document.addEventListener('DOMContentLoaded', function () {
            const urlParams = new URLSearchParams(window.location.search);
            const menuId = urlParams.get('id') || '1'; // fallback demo
            currentMenu = Store.getMenuById(menuId);
            if (!currentMenu) { window.location.href = 'beranda.html'; return; }

            // Render
            document.getElementById('detail-img').src = currentMenu.gambar;
            document.getElementById('detail-img').alt = currentMenu.nama;
            document.getElementById('detail-name').textContent = currentMenu.nama;
            document.getElementById('detail-price').textContent = formatRupiah(currentMenu.harga);
            document.getElementById('detail-desc').textContent = currentMenu.deskripsi;
            updateBtn();

            // Cart badge
            const count = Store.getCartCount ? Store.getCartCount() : 0;
            if (count > 0) {
                const badge = document.getElementById('cart-badge');
                badge.textContent = count;
                badge.style.display = 'flex';
            }
        });

        function changeQty(delta) {
            quantity = Math.max(1, quantity + delta);
            document.getElementById('qty-value').textContent = quantity;
            document.getElementById('btn-minus').disabled = (quantity <= 1);
            updateBtn();
        }

        function updateBtn() {
            if (!currentMenu) return;
            document.getElementById('btn-price').textContent = formatRupiah(currentMenu.harga * quantity);
        }

        function addToCart() {
            const catatan = document.getElementById('catatan-input').value.trim();
            Store.addToCart(currentMenu.id, quantity, catatan);

            // Feedback visual
            const btn = document.getElementById('btn-tambah');
            btn.style.background = '#2D5C42';
            btn.querySelector('.btn-label').innerHTML = `
                <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width:17px;height:17px;stroke:rgba(255,255,255,0.9)">
                    <polyline points="20 6 9 17 4 12"/>
                </svg>
                Ditambahkan!`;
            btn.querySelector('.btn-price').textContent = '';

            showToast(`${quantity}x ${currentMenu.nama} ditambahkan ke keranjang`);
            setTimeout(() => { window.location.href = 'beranda.html'; }, 1000);
        }

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }
    </script>
</body>
</html>
