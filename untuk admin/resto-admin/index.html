<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resto Nusantara - Admin Panel</title>
    <link rel="stylesheet" href="shared/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Poppins', sans-serif;
        }

        .login-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #F7F7F7;
            padding: 24px;
        }

        .login-box {
            background: #fff;
            padding: 3rem 2.5rem;
            border-radius: 12px;
            border: 0.5px solid #E0E0E0;
            max-width: 380px;
            width: 100%;
            text-align: center;
        }

        .logo-icon {
            margin-bottom: 1.5rem;
        }

        .logo-icon svg {
            width: 44px;
            height: 44px;
        }

        .login-box h1 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            font-size: 1.8rem;
            color: #1A3A2A;
            letter-spacing: 0.06em;
            margin-bottom: 4px;
        }

        .login-box p {
            color: #aaa;
            font-size: 0.8rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 32px;
            height: 1.5px;
            background: #1A3A2A;
            margin: 0.8rem auto 2rem;
        }

        .btn-primary {
            display: block;
            width: 100%;
            padding: 0.9rem;
            background: #1A3A2A;
            color: #fff;
            text-align: center;
            border-radius: 6px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 500;
            font-size: 0.88rem;
            letter-spacing: 0.08em;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-primary:hover { background: #0D1F17; }
    </style>
</head>
<body>
    <div class="login-page">
        <div class="login-box">
            <div class="logo-icon">
                <svg viewBox="0 0 44 44" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="22" cy="22" r="20" stroke="#1A3A2A" stroke-width="1.2"/>
                    <path d="M22 10 C22 10 29 15.5 29 22 C29 28.5 22 34 22 34 C22 34 15 28.5 15 22 C15 15.5 22 10 22 10Z"
                          stroke="#1A3A2A" stroke-width="1" fill="none"/>
                    <line x1="10" y1="22" x2="34" y2="22" stroke="#1A3A2A" stroke-width="0.8"/>
                </svg>
            </div>

            <h1>Resto Nusantara</h1>
            <div class="divider"></div>
            <p>Panel Admin</p>

            <a href="admin/dashboard.html" class="btn-primary">Masuk ke Dashboard</a>
        </div>
    </div>
</body>
</html>
